<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Request Email to Client</title>
  <style>
    :root {
      --svs-dark: #243746;
      --svs-blue: #49697c;
      --svs-accent: #6f8ea0;
      --svs-soft: #edf3f6;
      --svs-border: #c7d4dc;
      --text: #1f2a33;
      --muted: #647784;
      --white: #ffffff;
      --shadow: 0 14px 34px rgba(36, 55, 70, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(111, 142, 160, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(73, 105, 124, 0.16), transparent 24%),
        linear-gradient(180deg, #eef4f7 0%, #e7eef3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      padding: 26px 20px 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: 26px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(199, 212, 220, 0.95);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      background: #fff;
      border-radius: 18px;
      padding: 8px;
      border: 1px solid var(--svs-border);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 30px;
      color: var(--svs-dark);
      line-height: 1.15;
    }

    .brand-text p {
      margin: 7px 0 0;
      color: var(--svs-blue);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--svs-soft);
      color: var(--svs-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--svs-border);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
    }

    .panel {
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--svs-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 18px;
      font-size: 26px;
      color: var(--svs-dark);
    }

    .section-title {
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--svs-border);
      font-size: 17px;
      font-weight: 700;
      color: var(--svs-dark);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--svs-dark);
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--svs-border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: #fbfdfe;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 520px;
      line-height: 1.5;
    }

    .subject-box {
      min-height: 110px;
      margin-bottom: 16px;
    }

    .help-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, #f4f8fa 0%, #edf3f6 100%);
      border: 1px solid var(--svs-border);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, var(--svs-dark), var(--svs-blue));
      color: white;
    }

    .action-btn.secondary {
      background: var(--svs-soft);
      color: var(--svs-dark);
      border: 1px solid var(--svs-border);
    }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="./svs-logo.png" alt="SVS Logo">
        <div class="brand-text">
          <h1>Survey Request Email to Client</h1>
          <p>Secure Vision Solutions</p>
        </div>
      </div>

      <div class="topbar-right">
        <button class="nav-btn" onclick="goTo('index.html')">Home</button>
        <button class="nav-btn" onclick="goTo('dispatch.html')">Dispatch</button>
        <button class="nav-btn" onclick="goTo('service.html')">Service</button>
        <button class="nav-btn" onclick="goTo('installation.html')">Installation</button>
        <button class="nav-btn" onclick="goTo('calendar.html')">Calendar</button>
        <button class="nav-btn" onclick="goTo('checkin.html')">Check-In Board</button>
        <button class="nav-btn" onclick="goTo('technicians.html')">Technicians</button>
      </div>
    </div>

    <div class="layout">
      <div class="panel">
        <h2>Template Details</h2>

        <div class="section-title">Schedule</div>
        <div class="form-grid">
          <div class="field">
            <label for="request_type">Request Type</label>
            <select id="request_type">
              <option value="survey">Site Survey Walkthrough</option>
              <option value="service">Service Call</option>
            </select>
          </div>

          <div class="field">
            <label for="date_1">Date</label>
            <input type="date" id="date_1">
          </div>

          <div class="field">
            <label for="time_1">Time</label>
            <input list="time-options" id="time_1" placeholder="Example: 1:00 PM">
          </div>

          <div class="field">
            <label for="client_1">Client Name</label>
            <input id="client_1">
          </div>
        </div>

        <datalist id="time-options">
          <option value="12:00 AM"><option value="12:15 AM"><option value="12:30 AM"><option value="12:45 AM">
          <option value="1:00 AM"><option value="1:15 AM"><option value="1:30 AM"><option value="1:45 AM">
          <option value="2:00 AM"><option value="2:15 AM"><option value="2:30 AM"><option value="2:45 AM">
          <option value="3:00 AM"><option value="3:15 AM"><option value="3:30 AM"><option value="3:45 AM">
          <option value="4:00 AM"><option value="4:15 AM"><option value="4:30 AM"><option value="4:45 AM">
          <option value="5:00 AM"><option value="5:15 AM"><option value="5:30 AM"><option value="5:45 AM">
          <option value="6:00 AM"><option value="6:15 AM"><option value="6:30 AM"><option value="6:45 AM">
          <option value="7:00 AM"><option value="7:15 AM"><option value="7:30 AM"><option value="7:45 AM">
          <option value="8:00 AM"><option value="8:15 AM"><option value="8:30 AM"><option value="8:45 AM">
          <option value="9:00 AM"><option value="9:15 AM"><option value="9:30 AM"><option value="9:45 AM">
          <option value="10:00 AM"><option value="10:15 AM"><option value="10:30 AM"><option value="10:45 AM">
          <option value="11:00 AM"><option value="11:15 AM"><option value="11:30 AM"><option value="11:45 AM">
          <option value="12:00 PM"><option value="12:15 PM"><option value="12:30 PM"><option value="12:45 PM">
          <option value="1:00 PM"><option value="1:15 PM"><option value="1:30 PM"><option value="1:45 PM">
          <option value="2:00 PM"><option value="2:15 PM"><option value="2:30 PM"><option value="2:45 PM">
          <option value="3:00 PM"><option value="3:15 PM"><option value="3:30 PM"><option value="3:45 PM">
          <option value="4:00 PM"><option value="4:15 PM"><option value="4:30 PM"><option value="4:45 PM">
          <option value="5:00 PM"><option value="5:15 PM"><option value="5:30 PM"><option value="5:45 PM">
          <option value="6:00 PM"><option value="6:15 PM"><option value="6:30 PM"><option value="6:45 PM">
          <option value="7:00 PM"><option value="7:15 PM"><option value="7:30 PM"><option value="7:45 PM">
          <option value="8:00 PM"><option value="8:15 PM"><option value="8:30 PM"><option value="8:45 PM">
          <option value="9:00 PM"><option value="9:15 PM"><option value="9:30 PM"><option value="9:45 PM">
          <option value="10:00 PM"><option value="10:15 PM"><option value="10:30 PM"><option value="10:45 PM">
          <option value="11:00 PM"><option value="11:15 PM"><option value="11:30 PM"><option value="11:45 PM">
        </datalist>

        <div class="help-box">
          This template does not add anything to the calendar. It only generates the subject and email body for you.
        </div>

        <div class="actions">
          <button class="action-btn primary" onclick="generateTemplate()">Generate Template</button>
          <button class="action-btn secondary" onclick="copySubject()">Copy Subject</button>
          <button class="action-btn secondary" onclick="copyBody()">Copy Email</button>
          <button class="action-btn secondary" onclick="openOutlook()">Open in Outlook</button>
        </div>
      </div>

      <div class="panel">
        <h2>Generated Output</h2>

        <label for="subject_output">Subject</label>
        <textarea id="subject_output" class="subject-box"></textarea>

        <label for="body_output">Email Body</label>
        <textarea id="body_output"></textarea>
      </div>
    </div>
  </div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function formatPrettyDate(dateStr) {
      if (!dateStr) return "";
      const dt = new Date(dateStr + "T12:00:00");
      const day = dt.getDate();
      const suffix = (day >= 11 && day <= 13) ? "th" : ({1:"st",2:"nd",3:"rd"}[day % 10] || "th");
      const weekday = dt.toLocaleDateString("en-US", { weekday: "long" });
      const month = dt.toLocaleDateString("en-US", { month: "long" });
      return `${weekday}, ${month} ${day}${suffix}`;
    }

    function getMorningText() {
      const hour = new Date().getHours();
      if (hour < 12) return "morning";
      if (hour < 17) return "afternoon";
      return "evening";
    }

    function generateTemplate() {
      const requestType = document.getElementById("request_type").value;
      const date = document.getElementById("date_1").value.trim();
      const time = document.getElementById("time_1").value.trim();
      const clientName = document.getElementById("client_1").value.trim();

      if (!date || !time || !clientName) {
        alert("Please fill out the date, time, and client name.");
        return;
      }

      const dt = new Date(date + "T12:00:00");
      const dayText = dt.toLocaleDateString("en-US", { weekday: "long" });
      const monthText = dt.toLocaleDateString("en-US", { month: "long" });
      const dateText = dt.getDate();
      const prettyDate = formatPrettyDate(date);
      const greeting = getMorningText();

      const subjectRequestLabel = requestType === "service"
        ? "Service Call"
        : "Site Survey Walkthrough";

      const bodyRequestLabel = requestType === "service"
        ? "Service Call"
        : "IP Camera Site Survey Walkthrough";

      const subject = `*Please Confirm* SCW ${subjectRequestLabel} on ${dayText} ${monthText} ${dateText} at ${time} Local time`;

      const body = `Good ${greeting} all,

I am reaching out on behalf of Security Camera Warehouse. We have your site scheduled on ${prettyDate} at ${time} for the ${bodyRequestLabel} for ${clientName}. Please confirm your availability for this date and time. Also, if there is an alternate point of contact for the site, please provide their name and number.

Thank you,`;

      document.getElementById("subject_output").value = subject;
      document.getElementById("body_output").value = body;

      alert("Template generated.");
    }

    function copySubject() {
      const field = document.getElementById("subject_output");
      field.select();
      document.execCommand("copy");
      alert("Subject copied.");
    }

    function copyBody() {
      const field = document.getElementById("body_output");
      field.select();
      document.execCommand("copy");
      alert("Email body copied.");
    }

    function openOutlook() {
      const subject = encodeURIComponent(document.getElementById("subject_output").value);
      const body = encodeURIComponent(document.getElementById("body_output").value);
      window.open(`https://outlook.office.com/mail/deeplink/compose?subject=${subject}&body=${body}`, "_blank");
    }
  </script>
</body>
</html>
