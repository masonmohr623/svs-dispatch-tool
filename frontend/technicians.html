<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technician Contacts</title>
  <style>
    :root {
      --svs-dark: #243746;
      --svs-blue: #49697c;
      --svs-accent: #6f8ea0;
      --svs-soft: #edf3f6;
      --svs-border: #c7d4dc;
      --text: #1f2a33;
      --muted: #647784;
      --white: #ffffff;
      --shadow: 0 14px 34px rgba(36, 55, 70, 0.12);
      --danger: #b44545;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(111, 142, 160, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(73, 105, 124, 0.16), transparent 24%),
        linear-gradient(180deg, #eef4f7 0%, #e7eef3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1450px;
      margin: 0 auto;
      padding: 26px 20px 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: 26px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(199, 212, 220, 0.95);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      background: #fff;
      border-radius: 18px;
      padding: 8px;
      border: 1px solid var(--svs-border);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 30px;
      color: var(--svs-dark);
      line-height: 1.15;
    }

    .brand-text p {
      margin: 7px 0 0;
      color: var(--svs-blue);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--svs-soft);
      color: var(--svs-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--svs-border);
      transition: 0.18s ease;
    }

    .nav-btn:hover {
      background: #dfe9ee;
      transform: translateY(-1px);
    }

    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 22px;
    }

    .panel {
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--svs-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel h2 {
      margin: 0 0 18px;
      font-size: 26px;
      color: var(--svs-dark);
    }

    .panel p {
      color: var(--muted);
      line-height: 1.6;
      margin-top: 0;
    }

    .form-grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--svs-dark);
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    input {
      width: 100%;
      border: 1px solid var(--svs-border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: #fbfdfe;
      outline: none;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .btn {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--svs-dark), var(--svs-blue));
      color: white;
    }

    .btn.secondary {
      background: var(--svs-soft);
      color: var(--svs-dark);
      border: 1px solid var(--svs-border);
    }

    .btn.danger {
      background: linear-gradient(135deg, #933838, var(--danger));
      color: white;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar input {
      max-width: 320px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--svs-border);
      border-radius: 18px;
      background: #fbfdfe;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--svs-border);
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f3f8fb;
      color: var(--svs-dark);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .mini-btn.edit {
      background: var(--svs-soft);
      color: var(--svs-dark);
      border: 1px solid var(--svs-border);
    }

    .mini-btn.delete {
      background: #fff1f1;
      color: var(--danger);
      border: 1px solid #efcaca;
    }

    .empty-state {
      padding: 18px;
      color: var(--muted);
    }

    .status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }

    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="./svs-logo.png" alt="SVS Logo">
        <div class="brand-text">
          <h1>Technician Contacts</h1>
          <p>Secure Vision Solutions</p>
        </div>
      </div>

      <div class="topbar-right">
        <button class="nav-btn" onclick="goTo('index.html')">Home</button>
        <button class="nav-btn" onclick="goTo('dispatch.html')">Survey</button>
        <button class="nav-btn" onclick="goTo('service.html')">Service</button>
        <button class="nav-btn" onclick="goTo('installation.html')">Installation</button>
        <button class="nav-btn" onclick="goTo('calendar.html')">Calendar</button>
        <button class="nav-btn" onclick="goTo('checkin.html')">Check-In Board</button>
      </div>
    </div>

    <div class="layout">
      <div class="panel">
        <h2 id="form_title">Add Technician</h2>
        <p>Save a technician here so they show up in your template search.</p>

        <div class="form-grid">
          <div>
            <label for="tech_name">Technician Name</label>
            <input id="tech_name" placeholder="Example: Sean Lee">
          </div>

          <div>
            <label for="tech_phone">Technician Phone</label>
            <input id="tech_phone" placeholder="Example: (707) 606-1097">
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" onclick="saveTech()">Save Technician</button>
          <button class="btn secondary" onclick="clearForm()">Clear</button>
        </div>

        <div id="status" class="status"></div>
      </div>

      <div class="panel">
        <h2>Saved Technicians</h2>

        <div class="toolbar">
          <input id="search_input" placeholder="Search technicians..." oninput="renderTechs()">
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th style="width: 180px;">Actions</th>
              </tr>
            </thead>
            <tbody id="tech_table_body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://66.42.117.96:8000";
    let technicians = [];
    let editingTechId = null;

    function goTo(page) {
      window.location.href = page;
    }

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function clearForm() {
      editingTechId = null;
      document.getElementById("form_title").textContent = "Add Technician";
      document.getElementById("tech_name").value = "";
      document.getElementById("tech_phone").value = "";
      setStatus("");
    }

    async function fetchTechs() {
      const response = await fetch(`${API_URL}/technicians`);
      if (!response.ok) {
        throw new Error("Unable to load technicians.");
      }
      technicians = await response.json();
    }

    function renderTechs() {
      const body = document.getElementById("tech_table_body");
      const search = document.getElementById("search_input").value.toLowerCase().trim();

      const filtered = technicians.filter(tech => {
        const name = (tech.name || "").toLowerCase();
        const phone = (tech.phone || "").toLowerCase();
        return !search || name.includes(search) || phone.includes(search);
      });

      if (!filtered.length) {
        body.innerHTML = `
          <tr>
            <td colspan="3" class="empty-state">No technicians found.</td>
          </tr>
        `;
        return;
      }

      body.innerHTML = filtered.map(tech => `
        <tr>
          <td>${escapeHtml(tech.name || "")}</td>
          <td>${escapeHtml(tech.phone || "")}</td>
          <td>
            <div class="row-actions">
              <button class="mini-btn edit" onclick="editTech(${tech.id})">Edit</button>
              <button class="mini-btn delete" onclick="deleteTech(${tech.id}, '${escapeJs(tech.name || "")}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function editTech(id) {
      const tech = technicians.find(t => t.id === id);
      if (!tech) return;

      editingTechId = id;
      document.getElementById("form_title").textContent = "Edit Technician";
      document.getElementById("tech_name").value = tech.name || "";
      document.getElementById("tech_phone").value = tech.phone || "";
      setStatus(`Editing ${tech.name}`);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function saveTech() {
      try {
        const name = document.getElementById("tech_name").value.trim();
        const phone = document.getElementById("tech_phone").value.trim();

        if (!name || !phone) {
          setStatus("Please enter both the technician name and phone.");
          return;
        }

        let response;

        if (editingTechId) {
          response = await fetch(`${API_URL}/technicians/${editingTechId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, phone })
          });
        } else {
          response = await fetch(`${API_URL}/technicians`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, phone })
          });
        }

        const text = await response.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          throw new Error(text || "Invalid backend response.");
        }

        if (!response.ok) {
          throw new Error(data.detail || "Unable to save technician.");
        }

        await fetchTechs();
        renderTechs();

        if (editingTechId) {
          setStatus("Technician updated.");
        } else {
          setStatus("Technician saved.");
        }

        clearForm();
      } catch (error) {
        console.error(error);
        setStatus(`Error: ${error.message}`);
      }
    }

    async function deleteTech(id, name) {
      const confirmed = confirm(`Delete ${name}?`);
      if (!confirmed) return;

      try {
        const response = await fetch(`${API_URL}/technicians/${id}`, {
          method: "DELETE"
        });

        const text = await response.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          throw new Error(text || "Invalid backend response.");
        }

        if (!response.ok) {
          throw new Error(data.detail || "Unable to delete technician.");
        }

        if (editingTechId === id) {
          clearForm();
        }

        await fetchTechs();
        renderTechs();
        setStatus(`${name} deleted.`);
      } catch (error) {
        console.error(error);
        setStatus(`Error: ${error.message}`);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeJs(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    async function initPage() {
      await fetchTechs();
      renderTechs();
    }

    initPage();
  </script>
</body>
</html>
