<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technician Contacts</title>
  <style>
    :root {
      --svs-dark: #243746;
      --svs-blue: #49697c;
      --svs-accent: #6f8ea0;
      --svs-soft: #edf3f6;
      --svs-border: #c7d4dc;
      --text: #1f2a33;
      --muted: #647784;
      --white: #ffffff;
      --shadow: 0 14px 34px rgba(36, 55, 70, 0.12);
      --shadow-hover: 0 18px 40px rgba(36, 55, 70, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(111, 142, 160, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(73, 105, 124, 0.16), transparent 24%),
        linear-gradient(180deg, #eef4f7 0%, #e7eef3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1420px;
      margin: 0 auto;
      padding: 26px 20px 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: 26px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(199, 212, 220, 0.95);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      background: #fff;
      border-radius: 18px;
      padding: 8px;
      border: 1px solid var(--svs-border);
      box-shadow: 0 8px 20px rgba(36, 55, 70, 0.1);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 30px;
      color: var(--svs-dark);
      line-height: 1.15;
    }

    .brand-text p {
      margin: 7px 0 0;
      color: var(--svs-blue);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--svs-soft);
      color: var(--svs-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--svs-border);
      transition: 0.18s ease;
    }

    .nav-btn:hover {
      background: #dfe9ee;
      transform: translateY(-1px);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--svs-dark) 0%, var(--svs-blue) 58%, var(--svs-accent) 100%);
      color: white;
      padding: 34px 32px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero h2 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      color: #e5edf2;
      line-height: 1.7;
      font-size: 15px;
      max-width: 760px;
    }

    .layout {
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--svs-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .panel h3 {
      margin: 0 0 18px;
      font-size: 26px;
      color: var(--svs-dark);
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--svs-dark);
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    input {
      width: 100%;
      border: 1px solid var(--svs-border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: #fbfdfe;
      outline: none;
      margin-bottom: 16px;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--svs-dark), var(--svs-blue));
      color: white;
      box-shadow: 0 10px 22px rgba(36, 55, 70, 0.16);
      transition: 0.18s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
    }

    .search-wrap {
      margin-bottom: 18px;
    }

    .tech-list {
      display: grid;
      gap: 14px;
      max-height: 720px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .tech-card {
      border: 1px solid var(--svs-border);
      border-radius: 18px;
      background: #fbfdfe;
      padding: 18px;
      transition: 0.18s ease;
    }

    .tech-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }

    .tech-name {
      margin: 0 0 8px;
      font-size: 19px;
      font-weight: 700;
      color: var(--svs-dark);
    }

    .tech-phone {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 14px 0;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #edf3f6;
      border: 1px solid var(--svs-border);
      color: var(--svs-dark);
      font-size: 14px;
      line-height: 1.5;
      display: none;
    }

    .status.show {
      display: block;
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 18px 14px 34px;
      }

      .topbar {
        padding: 18px;
      }

      .brand img {
        width: 72px;
        height: 72px;
      }

      .brand-text h1 {
        font-size: 24px;
      }

      .hero {
        padding: 28px 22px;
      }

      .hero h2 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="./svs-logo.PNG" alt="SVS Logo">
        <div class="brand-text">
          <h1>Technician Contacts</h1>
          <p>Secure Vision Solutions</p>
        </div>
      </div>

      <div class="topbar-right">
        <button class="nav-btn" onclick="goTo('index.html')">Home</button>
        <button class="nav-btn" onclick="goTo('dispatch.html')">Survey</button>
        <button class="nav-btn" onclick="goTo('service.html')">Service</button>
        <button class="nav-btn" onclick="goTo('installation.html')">Installation</button>
        <button class="nav-btn" onclick="goTo('calendar.html')">Calendar</button>
        <button class="nav-btn" onclick="goTo('checkin.html')">Check-In Board</button>
      </div>
    </div>

    <div class="hero">
      <h2>Shared technician contact list</h2>
      <p>
        This page saves technician contacts to your running backend so everyone on the network can use the same list.
      </p>
    </div>

    <div class="layout">
      <div class="panel">
        <h3>Add Technician</h3>

        <label for="tech_name">Technician Name</label>
        <input id="tech_name" type="text" placeholder="Enter technician name">

        <label for="tech_phone">Phone Number</label>
        <input id="tech_phone" type="text" placeholder="Enter phone number">

        <button class="action-btn" onclick="addTechnician()">Save Technician</button>

        <div id="statusBox" class="status"></div>
      </div>

      <div class="panel">
        <h3>Saved Technicians</h3>

        <div class="search-wrap">
          <label for="search_input">Search</label>
          <input id="search_input" type="text" placeholder="Search by name or phone" oninput="renderTechnicians()">
        </div>

        <div id="tech_list" class="tech-list"></div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://192.168.6.81:8000";
    let technicians = [];

    function goTo(page) {
      window.location.href = page;
    }

    function showStatus(message) {
      const box = document.getElementById("statusBox");
      box.textContent = message;
      box.classList.add("show");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function fetchTechnicians() {
      const response = await fetch(`${API_URL}/technicians`);
      technicians = await response.json();
      renderTechnicians();
    }

    function renderTechnicians() {
      const search = document.getElementById("search_input").value.trim().toLowerCase();
      const container = document.getElementById("tech_list");

      const filtered = technicians.filter(tech => {
        const name = (tech.name || "").toLowerCase();
        const phone = (tech.phone || "").toLowerCase();
        return name.includes(search) || phone.includes(search);
      });

      if (!filtered.length) {
        container.innerHTML = `<div class="empty-state">No technicians found.</div>`;
        return;
      }

      container.innerHTML = filtered.map(tech => `
        <div class="tech-card">
          <div class="tech-name">${escapeHtml(tech.name)}</div>
          <div class="tech-phone">${escapeHtml(tech.phone)}</div>
        </div>
      `).join("");
    }

    async function addTechnician() {
      const name = document.getElementById("tech_name").value.trim();
      const phone = document.getElementById("tech_phone").value.trim();

      if (!name || !phone) {
        showStatus("Enter both a technician name and phone number.");
        return;
      }

      const response = await fetch(`${API_URL}/technicians`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, phone })
      });

      if (!response.ok) {
        showStatus("Unable to save technician.");
        return;
      }

      document.getElementById("tech_name").value = "";
      document.getElementById("tech_phone").value = "";

      showStatus("Technician saved.");
      await fetchTechnicians();
    }

    fetchTechnicians();
  </script>
</body>
</html>
