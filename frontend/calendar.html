<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVS Calendar</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --panel: rgba(255,255,255,0.92);
      --panel-solid: #ffffff;
      --border: #dde3ea;
      --text: #1f2933;
      --muted: #6b7785;
      --shadow: 0 14px 32px rgba(31, 41, 51, 0.08);
      --blue: #3b82f6;
      --blue-soft: #dbeafe;
      --green: #22c55e;
      --green-soft: #dcfce7;
      --amber: #f59e0b;
      --amber-soft: #fef3c7;
      --red: #ef4444;
      --red-soft: #fee2e2;
      --svs-dark: #243746;
      --svs-blue: #49697c;
      --svs-soft: #edf3f6;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(73, 105, 124, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 20%),
        linear-gradient(180deg, #f8fafc 0%, #f3f5f8 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1540px;
      margin: 0 auto;
      padding: 24px 18px 36px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      border-radius: 26px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .brand img {
      width: 76px;
      height: 76px;
      object-fit: contain;
      background: #fff;
      border-radius: 18px;
      padding: 8px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
      color: var(--svs-dark);
      font-weight: 700;
    }

    .brand-text p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.35px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 15px;
      background: #fff;
      color: var(--svs-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .nav-btn:hover {
      background: #f4f7fa;
      transform: translateY(-1px);
    }

    .shell {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      align-items: start;
    }

    .calendar-panel,
    .details-panel {
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      flex-wrap: wrap;
    }

    .calendar-title-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .calendar-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }

    .today-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      background: var(--blue-soft);
      color: var(--blue);
      border: 1px solid #c9dcff;
    }

    .calendar-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .icon-btn,
    .control-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 14px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .icon-btn:hover,
    .control-btn:hover {
      background: #f6f8fb;
      transform: translateY(-1px);
    }

    .calendar-grid-wrap {
      padding: 14px 14px 16px;
    }

    .weekday-row {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .weekday {
      padding: 10px 8px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.45px;
      font-weight: 700;
      text-align: center;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .day-cell {
      min-height: 128px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      padding: 10px 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      cursor: pointer;
      transition: 0.18s ease;
      overflow: hidden;
    }

    .day-cell:hover {
      border-color: #cfd7e1;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(31, 41, 51, 0.05);
    }

    .day-cell.other-month {
      background: #fafbfd;
      color: #9aa6b2;
    }

    .day-cell.selected {
      border-color: #b9d2ff;
      box-shadow: inset 0 0 0 1px #c9dcff;
      background: #fcfdff;
    }

    .day-cell.today {
      border-color: #bfdbfe;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    }

    .day-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .day-number {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .today .day-number {
      background: var(--blue);
      color: white;
    }

    .event-stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow: hidden;
    }

    .event-pill {
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid transparent;
    }

    .event-pill.survey {
      background: var(--blue-soft);
      color: var(--blue);
      border-color: #cfe0ff;
    }

    .event-pill.installation {
      background: var(--green-soft);
      color: var(--green);
      border-color: #ccefd9;
    }

    .event-pill.service {
      background: var(--amber-soft);
      color: var(--amber);
      border-color: #f6e1a6;
    }

    .event-pill.completed {
      background: var(--red-soft);
      color: var(--red);
      border-color: #f8caca;
    }

    .more-text {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      padding: 2px 2px 0;
    }

    .details-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
    }

    .details-header h2 {
      margin: 0;
      font-size: 24px;
      color: var(--text);
    }

    .details-header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .legend {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .dot.survey { background: var(--blue); }
    .dot.installation { background: var(--green); }
    .dot.service { background: var(--amber); }
    .dot.completed { background: var(--red); }

    .details-body {
      padding: 16px;
      max-height: 74vh;
      overflow-y: auto;
      display: grid;
      gap: 12px;
    }

    .event-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: #fff;
      padding: 16px;
      display: grid;
      gap: 8px;
    }

    .event-card h3 {
      margin: 0;
      font-size: 18px;
      color: var(--text);
      line-height: 1.3;
    }

    .event-meta {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    .status-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--text);
    }

    .status-pill.checked-in {
      background: var(--green-soft);
      color: var(--green);
      border-color: #ccefd9;
    }

    .status-pill.completed {
      background: var(--red-soft);
      color: var(--red);
      border-color: #f8caca;
    }

    .status-pill.not-checked {
      background: #f8fafc;
      color: var(--muted);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .mini-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .mini-btn.edit {
      background: var(--svs-soft);
      color: var(--svs-dark);
      border: 1px solid var(--border);
    }

    .mini-btn.delete {
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid #f6c7c7;
    }

    .empty-state {
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 26px 18px;
      background: #fff;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      text-align: center;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 9999;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: min(900px, 100%);
      max-height: 90vh;
      overflow-y: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 2;
    }

    .modal-header h3 {
      margin: 0;
      font-size: 24px;
      color: var(--text);
    }

    .close-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .modal-body {
      padding: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--svs-dark);
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    .field input,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: #fbfdfe;
      outline: none;
    }

    .modal-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .save-btn,
    .cancel-btn {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .save-btn {
      background: linear-gradient(135deg, var(--svs-dark), var(--svs-blue));
      color: white;
    }

    .cancel-btn {
      background: var(--svs-soft);
      color: var(--svs-dark);
      border: 1px solid var(--border);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1200px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .details-body {
        max-height: none;
      }
    }

    @media (max-width: 820px) {
      .month-grid,
      .weekday-row {
        gap: 6px;
      }

      .day-cell {
        min-height: 108px;
        padding: 8px;
        border-radius: 16px;
      }

      .calendar-title {
        font-size: 24px;
      }

      .brand-text h1 {
        font-size: 25px;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 12px 28px;
      }

      .topbar {
        padding: 16px;
      }

      .brand img {
        width: 66px;
        height: 66px;
      }

      .weekday {
        font-size: 11px;
        padding: 8px 4px;
      }

      .day-cell {
        min-height: 98px;
      }

      .event-pill {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="brand">
        <img src="./svs-logo.png" alt="SVS Logo">
        <div class="brand-text">
          <h1>SVS Calendar</h1>
          <p>Secure Vision Solutions</p>
        </div>
      </div>

      <div class="topbar-right">
        <button class="nav-btn" onclick="goTo('index.html')">Home</button>
        <button class="nav-btn" onclick="goTo('dispatch.html')">Survey</button>
        <button class="nav-btn" onclick="goTo('service.html')">Service</button>
        <button class="nav-btn" onclick="goTo('installation.html')">Installation</button>
        <button class="nav-btn" onclick="goTo('checkin.html')">Check-In Board</button>
        <button class="nav-btn" onclick="goTo('technicians.html')">Technicians</button>
      </div>
    </div>

    <div class="shell">
      <div class="calendar-panel">
        <div class="calendar-header">
          <div class="calendar-title-wrap">
            <h2 id="month_label" class="calendar-title">Month</h2>
            <span class="today-chip" id="today_chip">Today</span>
          </div>

          <div class="calendar-controls">
            <button class="icon-btn" onclick="changeMonth(-1)">‹</button>
            <button class="control-btn" onclick="goToToday()">Today</button>
            <button class="icon-btn" onclick="changeMonth(1)">›</button>
          </div>
        </div>

        <div class="calendar-grid-wrap">
          <div class="weekday-row">
            <div class="weekday">Sun</div>
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
          </div>

          <div id="month_grid" class="month-grid"></div>
        </div>
      </div>

      <div class="details-panel">
        <div class="details-header">
          <h2 id="selected_day_title">Selected Day</h2>
          <p id="selected_day_subtitle">Tap a day to view its events.</p>

          <div class="legend">
            <span class="legend-item"><span class="dot survey"></span> Survey</span>
            <span class="legend-item"><span class="dot installation"></span> Installation</span>
            <span class="legend-item"><span class="dot service"></span> Service</span>
            <span class="legend-item"><span class="dot completed"></span> Completed</span>
          </div>
        </div>

        <div id="details_body" class="details-body"></div>
      </div>
    </div>
  </div>

  <div id="edit_modal_overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Event</h3>
        <button class="close-btn" onclick="closeEditModal()">Close</button>
      </div>

      <div class="modal-body">
        <div class="form-grid">
          <div class="field">
            <label for="edit_client">Client</label>
            <input id="edit_client">
          </div>

          <div class="field">
            <label for="edit_site">Site</label>
            <input id="edit_site">
          </div>

          <div class="field full">
            <label for="edit_address">Address</label>
            <input id="edit_address">
          </div>

          <div class="field">
            <label for="edit_technician">Technician</label>
            <input id="edit_technician">
          </div>

          <div class="field">
            <label for="edit_technician_phone">Technician Phone</label>
            <input id="edit_technician_phone">
          </div>

          <div class="field">
            <label for="edit_contact_name">Site Contact Name</label>
            <input id="edit_contact_name">
          </div>

          <div class="field">
            <label for="edit_contact_phone">Site Contact Phone</label>
            <input id="edit_contact_phone">
          </div>

          <div class="field full">
            <label for="edit_contact_email">Site Contact Email</label>
            <input id="edit_contact_email">
          </div>

          <div class="field">
            <label for="edit_template_type">Template Type</label>
            <select id="edit_template_type">
              <option value="Survey">Survey</option>
              <option value="Installation">Installation</option>
              <option value="Service">Service</option>
            </select>
          </div>

          <div class="field">
            <label for="edit_project_type">Project Type</label>
            <select id="edit_project_type" onchange="toggleEditProjectTypeFields()">
              <option value="ip_camera">IP Camera</option>
              <option value="access_control">Access Control</option>
              <option value="both">IP Camera + Access Control</option>
            </select>
          </div>

          <div class="field">
            <label for="edit_date">Site Date</label>
            <input type="date" id="edit_date">
          </div>

          <div class="field">
            <label for="edit_arrival_type">Arrival Type</label>
            <select id="edit_arrival_type" onchange="toggleEditArrivalType()">
              <option value="exact">Exact Time</option>
              <option value="window">Arrival Window</option>
            </select>
          </div>

          <div class="field" id="edit_time_field">
            <label for="edit_time">Site Local Time</label>
            <input id="edit_time" placeholder="Example: 1:00 PM">
          </div>

          <div class="field hidden" id="edit_window_start_field">
            <label for="edit_window_start">Site Local Window Start</label>
            <input id="edit_window_start" placeholder="Example: 10:00 AM">
          </div>

          <div class="field hidden" id="edit_window_end_field">
            <label for="edit_window_end">Site Local Window End</label>
            <input id="edit_window_end" placeholder="Example: 12:00 PM">
          </div>

          <div class="field full">
            <div class="modal-note">
              Enter the site’s local time here. The calendar will convert and save it in your local time.
            </div>
          </div>

          <div class="field full" id="edit_single_clickup_field">
            <label for="edit_task_id">ClickUp ID</label>
            <input id="edit_task_id">
          </div>

          <div class="field full" id="edit_single_proposal_field">
            <label for="edit_proposal">Proposal</label>
            <input id="edit_proposal">
          </div>

          <div class="field full hidden" id="edit_ip_clickup_field">
            <label for="edit_ip_camera_clickup_id">IP Camera ClickUp ID</label>
            <input id="edit_ip_camera_clickup_id">
          </div>

          <div class="field full hidden" id="edit_ac_clickup_field">
            <label for="edit_access_control_clickup_id">Access Control ClickUp ID</label>
            <input id="edit_access_control_clickup_id">
          </div>

          <div class="field full hidden" id="edit_ip_proposal_field">
            <label for="edit_ip_camera_proposal">IP Camera Proposal</label>
            <input id="edit_ip_camera_proposal">
          </div>

          <div class="field full hidden" id="edit_ac_proposal_field">
            <label for="edit_access_control_proposal">Access Control Proposal</label>
            <input id="edit_access_control_proposal">
          </div>
        </div>

        <div class="modal-actions">
          <button class="save-btn" onclick="saveEditedEvent()">Save Changes</button>
          <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "http://66.42.117.96:8000";
    let eventsCache = [];
    let currentMonthDate = new Date();
    let selectedDate = formatDateLocal(new Date());
    let editingEvent = null;

    function goTo(page) {
      window.location.href = page;
    }

    function formatDateLocal(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatPrettyDate(dateStr) {
      if (!dateStr) return "";
      const dt = new Date(dateStr + "T12:00:00");
      const weekday = dt.toLocaleDateString("en-US", { weekday: "long" });
      const month = dt.toLocaleDateString("en-US", { month: "long" });
      const day = dt.getDate();
      const suffix = (day >= 11 && day <= 13) ? "th" : ({1: "st", 2: "nd", 3: "rd"}[day % 10] || "th");
      return `${weekday}, ${month} ${day}${suffix}`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function getTemplateClass(event) {
      if (event.checked_out) return "completed";
      const type = String(event.template_type || "").toLowerCase();
      if (type === "survey") return "survey";
      if (type === "installation") return "installation";
      if (type === "service") return "service";
      return "survey";
    }

    function getStatusMarkup(event) {
      if (event.checked_out) {
        return `
          <span class="status-pill completed">Completed</span>
          ${event.check_out_time ? `<span class="status-pill completed">Checked out ${escapeHtml(event.check_out_time)}</span>` : ""}
        `;
      }

      if (event.checked_in) {
        return `
          <span class="status-pill checked-in">Checked In</span>
          ${event.check_in_time ? `<span class="status-pill checked-in">Checked in ${escapeHtml(event.check_in_time)}</span>` : ""}
        `;
      }

      return `<span class="status-pill not-checked">Not Checked In</span>`;
    }

    function getAddressState(address) {
      const upper = String(address || "").toUpperCase().trim();
      const abbrevMatch = upper.match(/\b(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY)\b(?:\s+\d{5}(?:-\d{4})?)?$/);
      if (abbrevMatch) return abbrevMatch[1];

      const stateNames = {
        ALABAMA: "AL", ALASKA: "AK", ARIZONA: "AZ", ARKANSAS: "AR", CALIFORNIA: "CA",
        COLORADO: "CO", CONNECTICUT: "CT", DELAWARE: "DE", FLORIDA: "FL", GEORGIA: "GA",
        HAWAII: "HI", IDAHO: "ID", ILLINOIS: "IL", INDIANA: "IN", IOWA: "IA",
        KANSAS: "KS", KENTUCKY: "KY", LOUISIANA: "LA", MAINE: "ME", MARYLAND: "MD",
        MASSACHUSETTS: "MA", MICHIGAN: "MI", MINNESOTA: "MN", MISSISSIPPI: "MS",
        MISSOURI: "MO", MONTANA: "MT", NEBRASKA: "NE", NEVADA: "NV", "NEW HAMPSHIRE": "NH",
        "NEW JERSEY": "NJ", "NEW MEXICO": "NM", "NEW YORK": "NY", "NORTH CAROLINA": "NC",
        "NORTH DAKOTA": "ND", OHIO: "OH", OKLAHOMA: "OK", OREGON: "OR", PENNSYLVANIA: "PA",
        "RHODE ISLAND": "RI", "SOUTH CAROLINA": "SC", "SOUTH DAKOTA": "SD", TENNESSEE: "TN",
        TEXAS: "TX", UTAH: "UT", VERMONT: "VT", VIRGINIA: "VA", WASHINGTON: "WA",
        "WEST VIRGINIA": "WV", WISCONSIN: "WI", WYOMING: "WY"
      };

      for (const [name, abbr] of Object.entries(stateNames)) {
        if (upper.includes(name)) return abbr;
      }
      return null;
    }

    function inferTimeZoneFromAddress(address) {
      const state = getAddressState(address);
      const map = {
        AL: "America/Chicago", AK: "America/Anchorage", AZ: "America/Phoenix", AR: "America/Chicago",
        CA: "America/Los_Angeles", CO: "America/Denver", CT: "America/New_York", DE: "America/New_York",
        FL: "America/New_York", GA: "America/New_York", HI: "Pacific/Honolulu", ID: "America/Denver",
        IL: "America/Chicago", IN: "America/New_York", IA: "America/Chicago", KS: "America/Chicago",
        KY: "America/New_York", LA: "America/Chicago", ME: "America/New_York", MD: "America/New_York",
        MA: "America/New_York", MI: "America/New_York", MN: "America/Chicago", MS: "America/Chicago",
        MO: "America/Chicago", MT: "America/Denver", NE: "America/Chicago", NV: "America/Los_Angeles",
        NH: "America/New_York", NJ: "America/New_York", NM: "America/Denver", NY: "America/New_York",
        NC: "America/New_York", ND: "America/Chicago", OH: "America/New_York", OK: "America/Chicago",
        OR: "America/Los_Angeles", PA: "America/New_York", RI: "America/New_York", SC: "America/New_York",
        SD: "America/Chicago", TN: "America/Chicago", TX: "America/Chicago", UT: "America/Denver",
        VT: "America/New_York", VA: "America/New_York", WA: "America/Los_Angeles", WV: "America/New_York",
        WI: "America/Chicago", WY: "America/Denver"
      };
      return map[state] || Intl.DateTimeFormat().resolvedOptions().timeZone;
    }

    function parseTime12(timeString) {
      const match = String(timeString || "").trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return null;

      let hours = parseInt(match[1], 10);
      const minutes = parseInt(match[2], 10);
      const meridiem = match[3].toUpperCase();

      if (meridiem === "AM" && hours === 12) hours = 0;
      if (meridiem === "PM" && hours !== 12) hours += 12;

      return { hours, minutes };
    }

    function getZonedParts(date, timeZone) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);

      const obj = {};
      for (const part of parts) {
        if (part.type !== "literal") obj[part.type] = part.value;
      }

      return {
        year: parseInt(obj.year, 10),
        month: parseInt(obj.month, 10),
        day: parseInt(obj.day, 10),
        hour: parseInt(obj.hour, 10),
        minute: parseInt(obj.minute, 10)
      };
    }

    function zonedDateTimeToDate(dateStr, timeStr, timeZone) {
      const [year, month, day] = String(dateStr || "").split("-").map(Number);
      const parsedTime = parseTime12(timeStr);
      if (!year || !month || !day || !parsedTime) return null;

      let utcGuess = Date.UTC(year, month - 1, day, parsedTime.hours, parsedTime.minutes);

      for (let i = 0; i < 3; i++) {
        const zoned = getZonedParts(new Date(utcGuess), timeZone);
        const desiredUtc = Date.UTC(year, month - 1, day, parsedTime.hours, parsedTime.minutes);
        const zonedUtc = Date.UTC(zoned.year, zoned.month - 1, zoned.day, zoned.hour, zoned.minute);
        utcGuess += desiredUtc - zonedUtc;
      }

      return new Date(utcGuess);
    }

    function formatLocalTime(dateObj) {
      return dateObj.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function formatLocalDateInput(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function buildConvertedSchedule(site) {
      const siteTimeZone = inferTimeZoneFromAddress(site.address);

      if (site.arrival_type === "window") {
        const startDate = zonedDateTimeToDate(site.date, site.window_start, siteTimeZone);
        const endDate = zonedDateTimeToDate(site.date, site.window_end, siteTimeZone);

        if (!startDate || !endDate) {
          return {
            calendarDate: site.date,
            localTime: "",
            localWindowStart: site.window_start,
            localWindowEnd: site.window_end,
            displayTime: `${site.window_start} - ${site.window_end}`
          };
        }

        return {
          calendarDate: formatLocalDateInput(startDate),
          localTime: "",
          localWindowStart: formatLocalTime(startDate),
          localWindowEnd: formatLocalTime(endDate),
          displayTime: `${formatLocalTime(startDate)} - ${formatLocalTime(endDate)}`
        };
      }

      const converted = zonedDateTimeToDate(site.date, site.time, siteTimeZone);

      if (!converted) {
        return {
          calendarDate: site.date,
          localTime: site.time,
          localWindowStart: "",
          localWindowEnd: "",
          displayTime: site.time
        };
      }

      return {
        calendarDate: formatLocalDateInput(converted),
        localTime: formatLocalTime(converted),
        localWindowStart: "",
        localWindowEnd: "",
        displayTime: formatLocalTime(converted)
      };
    }

    function getEventsForDate(dateStr) {
      return eventsCache.filter(event => (event.date || "") === dateStr);
    }

    async function fetchEvents() {
      const response = await fetch(`${API_URL}/events`);
      if (!response.ok) {
        throw new Error("Unable to load calendar events.");
      }
      eventsCache = await response.json();
    }

    function renderCalendar() {
      const grid = document.getElementById("month_grid");
      grid.innerHTML = "";

      const year = currentMonthDate.getFullYear();
      const month = currentMonthDate.getMonth();

      const firstOfMonth = new Date(year, month, 1);
      const startDayIndex = firstOfMonth.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      document.getElementById("month_label").textContent =
        currentMonthDate.toLocaleDateString("en-US", { month: "long", year: "numeric" });

      const todayStr = formatDateLocal(new Date());
      document.getElementById("today_chip").textContent = `Today · ${formatPrettyDate(todayStr)}`;

      const totalCells = 42;

      for (let i = 0; i < totalCells; i++) {
        let cellDate;
        let dayNumber;
        let otherMonth = false;

        if (i < startDayIndex) {
          dayNumber = daysInPrevMonth - startDayIndex + i + 1;
          cellDate = new Date(year, month - 1, dayNumber);
          otherMonth = true;
        } else if (i >= startDayIndex + daysInMonth) {
          dayNumber = i - (startDayIndex + daysInMonth) + 1;
          cellDate = new Date(year, month + 1, dayNumber);
          otherMonth = true;
        } else {
          dayNumber = i - startDayIndex + 1;
          cellDate = new Date(year, month, dayNumber);
        }

        const dateStr = formatDateLocal(cellDate);
        const events = getEventsForDate(dateStr);
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedDate;

        const cell = document.createElement("div");
        cell.className = `day-cell${otherMonth ? " other-month" : ""}${isToday ? " today" : ""}${isSelected ? " selected" : ""}`;
        cell.onclick = () => {
          selectedDate = dateStr;
          renderCalendar();
          renderSelectedDay();
        };

        const visibleEvents = events.slice(0, 3);
        const extraCount = Math.max(0, events.length - visibleEvents.length);

        cell.innerHTML = `
          <div class="day-top">
            <span class="day-number">${dayNumber}</span>
          </div>
          <div class="event-stack">
            ${visibleEvents.map(event => `
              <div class="event-pill ${getTemplateClass(event)}">
                ${escapeHtml(event.client || event.site || event.template_type || "Event")}
              </div>
            `).join("")}
            ${extraCount > 0 ? `<div class="more-text">+${extraCount} more</div>` : ""}
          </div>
        `;

        grid.appendChild(cell);
      }
    }

    function renderSelectedDay() {
      const body = document.getElementById("details_body");
      const title = document.getElementById("selected_day_title");
      const subtitle = document.getElementById("selected_day_subtitle");

      const events = getEventsForDate(selectedDate);

      title.textContent = formatPrettyDate(selectedDate);
      subtitle.textContent = `${events.length} event${events.length === 1 ? "" : "s"} scheduled`;

      if (!events.length) {
        body.innerHTML = `
          <div class="empty-state">
            No events scheduled for this day.
          </div>
        `;
        return;
      }

      body.innerHTML = events
        .sort((a, b) => {
          const at = (a.time || a.window_start || "").toUpperCase();
          const bt = (b.time || b.window_start || "").toUpperCase();
          return at.localeCompare(bt);
        })
        .map(event => {
          const timeText =
            event.displayTime ||
            event.time ||
            `${event.window_start || ""}${event.window_start && event.window_end ? " - " : ""}${event.window_end || ""}` ||
            "No time listed";

          const siteTimeText =
            event.site_display_time ||
            event.time ||
            `${event.window_start || ""}${event.window_start && event.window_end ? " - " : ""}${event.window_end || ""}` ||
            "No site time listed";

          const proposalText = event.project_type === "both"
            ? `IP: ${escapeHtml(event.ip_camera_proposal || "None")} | AC: ${escapeHtml(event.access_control_proposal || "None")}`
            : escapeHtml(event.proposal || "None");

          return `
            <div class="event-card">
              <h3>${escapeHtml(event.client || "No client")} — ${escapeHtml(event.site || "No site")}</h3>
              <div class="event-meta"><strong>Type:</strong> ${escapeHtml(event.template_type || "No type")}</div>
              <div class="event-meta"><strong>Scope:</strong> ${escapeHtml(event.project_type || "No scope")}</div>
              <div class="event-meta"><strong>Your Time:</strong> ${escapeHtml(timeText)}</div>
              <div class="event-meta"><strong>Site Local Time:</strong> ${escapeHtml(siteTimeText)}</div>
              <div class="event-meta"><strong>Technician:</strong> ${escapeHtml(event.technician || "Not assigned")}</div>
              <div class="event-meta"><strong>Site Contact:</strong> ${escapeHtml(event.contact_name || "None")}</div>
              <div class="event-meta"><strong>Address:</strong> ${escapeHtml(event.address || "No address")}</div>
              <div class="event-meta"><strong>Proposal:</strong> ${proposalText}</div>
              <div class="status-row">
                ${getStatusMarkup(event)}
              </div>
              <div class="card-actions">
                <button class="mini-btn edit" onclick="openEditModal(${event.id})">Edit</button>
                <button class="mini-btn delete" onclick="deleteEvent(${event.id})">Delete</button>
              </div>
            </div>
          `;
        })
        .join("");
    }

    function changeMonth(offset) {
      currentMonthDate = new Date(
        currentMonthDate.getFullYear(),
        currentMonthDate.getMonth() + offset,
        1
      );
      renderCalendar();
    }

    function goToToday() {
      const today = new Date();
      currentMonthDate = new Date(today.getFullYear(), today.getMonth(), 1);
      selectedDate = formatDateLocal(today);
      renderCalendar();
      renderSelectedDay();
    }

    function toggleEditArrivalType() {
      const type = document.getElementById("edit_arrival_type").value;
      document.getElementById("edit_time_field").classList.toggle("hidden", type === "window");
      document.getElementById("edit_window_start_field").classList.toggle("hidden", type !== "window");
      document.getElementById("edit_window_end_field").classList.toggle("hidden", type !== "window");
    }

    function toggleEditProjectTypeFields() {
      const projectType = document.getElementById("edit_project_type").value;
      const both = projectType === "both";

      document.getElementById("edit_single_clickup_field").classList.toggle("hidden", both);
      document.getElementById("edit_single_proposal_field").classList.toggle("hidden", both);

      document.getElementById("edit_ip_clickup_field").classList.toggle("hidden", !both);
      document.getElementById("edit_ac_clickup_field").classList.toggle("hidden", !both);
      document.getElementById("edit_ip_proposal_field").classList.toggle("hidden", !both);
      document.getElementById("edit_ac_proposal_field").classList.toggle("hidden", !both);
    }

    function siteLocalValuesFromEvent(event) {
      return {
        date: event.site_date || event.date || "",
        time: event.arrival_type === "exact" ? (event.site_display_time || event.time || "") : "",
        windowStart: event.arrival_type === "window"
          ? ((event.site_display_time || "").split(" - ")[0] || event.window_start || "")
          : "",
        windowEnd: event.arrival_type === "window"
          ? ((event.site_display_time || "").split(" - ")[1] || event.window_end || "")
          : ""
      };
    }

    function openEditModal(eventId) {
      const event = eventsCache.find(e => e.id === eventId);
      if (!event) return;

      editingEvent = event;
      const siteLocal = siteLocalValuesFromEvent(event);

      document.getElementById("edit_client").value = event.client || "";
      document.getElementById("edit_site").value = event.site || "";
      document.getElementById("edit_address").value = event.address || "";
      document.getElementById("edit_technician").value = event.technician || "";
      document.getElementById("edit_technician_phone").value = event.technician_phone || "";
      document.getElementById("edit_contact_name").value = event.contact_name || "";
      document.getElementById("edit_contact_phone").value = event.contact_phone || "";
      document.getElementById("edit_contact_email").value = event.contact_email || "";
      document.getElementById("edit_template_type").value = event.template_type || "Survey";
      document.getElementById("edit_project_type").value = event.project_type || "ip_camera";
      document.getElementById("edit_date").value = siteLocal.date;
      document.getElementById("edit_arrival_type").value = event.arrival_type || "exact";
      document.getElementById("edit_time").value = siteLocal.time;
      document.getElementById("edit_window_start").value = siteLocal.windowStart;
      document.getElementById("edit_window_end").value = siteLocal.windowEnd;
      document.getElementById("edit_task_id").value = event.task_id || "";
      document.getElementById("edit_proposal").value = event.proposal || "";
      document.getElementById("edit_ip_camera_clickup_id").value = event.ip_camera_clickup_id || "";
      document.getElementById("edit_access_control_clickup_id").value = event.access_control_clickup_id || "";
      document.getElementById("edit_ip_camera_proposal").value = event.ip_camera_proposal || "";
      document.getElementById("edit_access_control_proposal").value = event.access_control_proposal || "";

      toggleEditArrivalType();
      toggleEditProjectTypeFields();

      document.getElementById("edit_modal_overlay").classList.add("show");
    }

    function closeEditModal() {
      editingEvent = null;
      document.getElementById("edit_modal_overlay").classList.remove("show");
    }

    async function saveEditedEvent() {
      if (!editingEvent) return;

      try {
        const projectType = document.getElementById("edit_project_type").value;
        const arrivalType = document.getElementById("edit_arrival_type").value;
        const siteDate = document.getElementById("edit_date").value;
        const siteTime = document.getElementById("edit_time").value.trim();
        const siteWindowStart = document.getElementById("edit_window_start").value.trim();
        const siteWindowEnd = document.getElementById("edit_window_end").value.trim();
        const address = document.getElementById("edit_address").value.trim();

        const siteSchedule = {
          date: siteDate,
          address,
          arrival_type: arrivalType,
          time: siteTime,
          window_start: siteWindowStart,
          window_end: siteWindowEnd
        };

        const converted = buildConvertedSchedule(siteSchedule);

        const updatedEvent = {
          ...editingEvent,
          client: document.getElementById("edit_client").value.trim(),
          site: document.getElementById("edit_site").value.trim(),
          address: address,
          technician: document.getElementById("edit_technician").value.trim(),
          technician_phone: document.getElementById("edit_technician_phone").value.trim(),
          contact_name: document.getElementById("edit_contact_name").value.trim(),
          contact_phone: document.getElementById("edit_contact_phone").value.trim(),
          contact_email: document.getElementById("edit_contact_email").value.trim(),
          template_type: document.getElementById("edit_template_type").value,
          project_type: projectType,
          date: converted.calendarDate,
          site_date: siteDate,
          arrival_type: arrivalType,
          time: converted.localTime,
          window_start: converted.localWindowStart,
          window_end: converted.localWindowEnd,
          displayTime: converted.displayTime,
          site_display_time: arrivalType === "window"
            ? `${siteWindowStart} - ${siteWindowEnd}`
            : siteTime,
          site_timezone: inferTimeZoneFromAddress(address),
          task_id: projectType === "both" ? "" : document.getElementById("edit_task_id").value.trim(),
          proposal: projectType === "both" ? "" : document.getElementById("edit_proposal").value.trim(),
          ip_camera_clickup_id: projectType === "both" ? document.getElementById("edit_ip_camera_clickup_id").value.trim() : "",
          access_control_clickup_id: projectType === "both" ? document.getElementById("edit_access_control_clickup_id").value.trim() : "",
          ip_camera_proposal: projectType === "both" ? document.getElementById("edit_ip_camera_proposal").value.trim() : "",
          access_control_proposal: projectType === "both" ? document.getElementById("edit_access_control_proposal").value.trim() : ""
        };

        if (!updatedEvent.client || !updatedEvent.site || !updatedEvent.address || !siteDate) {
          alert("Please fill out client, site, address, and site date.");
          return;
        }

        if (arrivalType === "exact" && !siteTime) {
          alert("Please enter the site local time.");
          return;
        }

        if (arrivalType === "window" && (!siteWindowStart || !siteWindowEnd)) {
          alert("Please enter both site local window times.");
          return;
        }

        const response = await fetch(`${API_URL}/events/${editingEvent.id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(updatedEvent)
        });

        const text = await response.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          throw new Error(text || "Invalid backend response.");
        }

        if (!response.ok) {
          throw new Error(data.detail || "Unable to save event.");
        }

        closeEditModal();
        await fetchEvents();
        selectedDate = updatedEvent.date;
        currentMonthDate = new Date(updatedEvent.date + "T12:00:00");
        renderCalendar();
        renderSelectedDay();
        alert("Event updated.");
      } catch (error) {
        console.error(error);
        alert(`Save failed: ${error.message}`);
      }
    }

    async function deleteEvent(eventId) {
      const confirmed = confirm("Delete this event?");
      if (!confirmed) return;

      try {
        const response = await fetch(`${API_URL}/events/${eventId}`, {
          method: "DELETE"
        });

        const text = await response.text();
        let data = {};

        try {
          data = text ? JSON.parse(text) : {};
        } catch {
          throw new Error(text || "Invalid backend response.");
        }

        if (!response.ok) {
          throw new Error(data.detail || "Unable to delete event.");
        }

        await fetchEvents();
        renderCalendar();
        renderSelectedDay();
        alert("Event deleted.");
      } catch (error) {
        console.error(error);
        alert(`Delete failed: ${error.message}`);
      }
    }

    async function initPage() {
      await fetchEvents();
      renderCalendar();
      renderSelectedDay();
    }

    document.getElementById("edit_modal_overlay").addEventListener("click", (event) => {
      if (event.target.id === "edit_modal_overlay") {
        closeEditModal();
      }
    });

    initPage();
  </script>
</body>
