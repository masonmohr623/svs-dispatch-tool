<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dispatch Service Confirmation Template</title>
  <style>
    :root {
      --svs-dark: #243746;
      --svs-blue: #49697c;
      --svs-accent: #6f8ea0;
      --svs-soft: #edf3f6;
      --svs-border: #c7d4dc;
      --text: #1f2a33;
      --muted: #647784;
      --white: #ffffff;
      --shadow: 0 14px 34px rgba(36, 55, 70, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(111, 142, 160, 0.18), transparent 26%),
        radial-gradient(circle at top right, rgba(73, 105, 124, 0.16), transparent 24%),
        linear-gradient(180deg, #eef4f7 0%, #e7eef3 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      padding: 26px 20px 44px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border-radius: 26px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(199, 212, 220, 0.95);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .brand img {
      width: 84px;
      height: 84px;
      object-fit: contain;
      background: #fff;
      border-radius: 18px;
      padding: 8px;
      border: 1px solid var(--svs-border);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 30px;
      color: var(--svs-dark);
      line-height: 1.15;
    }

    .brand-text p {
      margin: 7px 0 0;
      color: var(--svs-blue);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .topbar-right {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-btn {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      background: var(--svs-soft);
      color: var(--svs-dark);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--svs-border);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 22px;
    }

    .panel {
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--svs-border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 18px;
      font-size: 26px;
      color: var(--svs-dark);
    }

    .section-title {
      margin: 24px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--svs-border);
      font-size: 17px;
      font-weight: 700;
      color: var(--svs-dark);
    }

    .subcard {
      background: #fbfdfe;
      border: 1px solid var(--svs-border);
      border-radius: 18px;
      padding: 18px;
      margin-top: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      font-weight: 700;
      color: var(--svs-dark);
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--svs-border);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      color: var(--text);
      background: #fbfdfe;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 520px;
      line-height: 1.5;
    }

    .subject-box {
      min-height: 110px;
      margin-bottom: 16px;
    }

    .help-box {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, #f4f8fa 0%, #edf3f6 100%);
      border: 1px solid var(--svs-border);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 13px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, var(--svs-dark), var(--svs-blue));
      color: white;
    }

    .action-btn.secondary {
      background: var(--svs-soft);
      color: var(--svs-dark);
      border: 1px solid var(--svs-border);
    }

    .search-results {
      display: grid;
      gap: 6px;
      margin-top: 8px;
      max-height: 180px;
      overflow-y: auto;
    }

    .search-item {
      background: #f2f7fa;
      border: 1px solid var(--svs-border);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .hidden { display: none; }

    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    const API_URL = "http://66.42.117.96:8000";
    let technicians = [];

    function goTo(page) {
      window.location.href = page;
    }

    async function fetchTechnicians() {
      const response = await fetch(`${API_URL}/technicians`);
      technicians = await response.json();
    }

    function searchTechs() {
      const value = document.getElementById("tech_name").value.toLowerCase().trim();
      const results = document.getElementById("tech_search_results");
      results.innerHTML = "";
      if (!value) return;

      technicians
        .filter(t => (t.name || "").toLowerCase().includes(value))
        .forEach(tech => {
          const item = document.createElement("div");
          item.className = "search-item";
          item.textContent = `${tech.name} - ${tech.phone}`;
          item.onclick = () => {
            document.getElementById("tech_name").value = tech.name || "";
            document.getElementById("tech_phone").value = tech.phone || "";
            results.innerHTML = "";
          };
          results.appendChild(item);
        });
    }

    async function autoSaveTech() {
      const name = document.getElementById("tech_name").value.trim();
      const phone = document.getElementById("tech_phone").value.trim();
      if (!name || !phone) return;

      const exists = technicians.some(t => (t.name || "").toLowerCase() === name.toLowerCase());
      if (!exists) {
        await fetch(`${API_URL}/technicians`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, phone })
        });
        await fetchTechnicians();
      }
    }

    function toggleArrivalType(siteNumber) {
      const type = document.getElementById(`arrival_type_${siteNumber}`).value;
      document.getElementById(`exact_time_field_${siteNumber}`).classList.toggle("hidden", type === "window");
      document.getElementById(`window_start_field_${siteNumber}`).classList.toggle("hidden", type !== "window");
      document.getElementById(`window_end_field_${siteNumber}`).classList.toggle("hidden", type !== "window");
    }

    function toggleSiteCount() {
      const count = document.getElementById("site_count").value;
      const showSecond = count === "2";
      document.getElementById("site2_title").classList.toggle("hidden", !showSecond);
      document.getElementById("site2_card").classList.toggle("hidden", !showSecond);
    }

    function toggleScopeFieldsForSite(siteNumber, isBoth) {
      document.querySelectorAll(`.single-scope-field-${siteNumber}`).forEach(el => {
        el.classList.toggle("hidden", isBoth);
      });

      document.querySelectorAll(`.both-scope-field-${siteNumber}`).forEach(el => {
        el.classList.toggle("hidden", !isBoth);
      });
    }

    function toggleAllProjectTypeFields() {
      const isBoth = document.getElementById("project_type").value === "both";
      toggleScopeFieldsForSite(1, isBoth);
      toggleScopeFieldsForSite(2, isBoth);
    }

    function formatPrettyDate(dateStr) {
      if (!dateStr) return "";
      const dt = new Date(dateStr + "T12:00:00");
      const day = dt.getDate();
      const suffix = (day >= 11 && day <= 13) ? "th" : ({1:"st",2:"nd",3:"rd"}[day % 10] || "th");
      const weekday = dt.toLocaleDateString("en-US", { weekday: "long" });
      const month = dt.toLocaleDateString("en-US", { month: "long" });
      return `${weekday}, ${month} ${day}${suffix}`;
    }

    function getAddressState(address) {
      const upper = String(address || "").toUpperCase().trim();
      const abbrevMatch = upper.match(/\b(AL|AK|AZ|AR|CA|CO|CT|DE|FL|GA|HI|ID|IL|IN|IA|KS|KY|LA|ME|MD|MA|MI|MN|MS|MO|MT|NE|NV|NH|NJ|NM|NY|NC|ND|OH|OK|OR|PA|RI|SC|SD|TN|TX|UT|VT|VA|WA|WV|WI|WY)\b(?:\s+\d{5}(?:-\d{4})?)?$/);
      if (abbrevMatch) return abbrevMatch[1];

      const stateNames = {
        ALABAMA: "AL", ALASKA: "AK", ARIZONA: "AZ", ARKANSAS: "AR", CALIFORNIA: "CA",
        COLORADO: "CO", CONNECTICUT: "CT", DELAWARE: "DE", FLORIDA: "FL", GEORGIA: "GA",
        HAWAII: "HI", IDAHO: "ID", ILLINOIS: "IL", INDIANA: "IN", IOWA: "IA",
        KANSAS: "KS", KENTUCKY: "KY", LOUISIANA: "LA", MAINE: "ME", MARYLAND: "MD",
        MASSACHUSETTS: "MA", MICHIGAN: "MI", MINNESOTA: "MN", MISSISSIPPI: "MS",
        MISSOURI: "MO", MONTANA: "MT", NEBRASKA: "NE", NEVADA: "NV", "NEW HAMPSHIRE": "NH",
        "NEW JERSEY": "NJ", "NEW MEXICO": "NM", "NEW YORK": "NY", "NORTH CAROLINA": "NC",
        "NORTH DAKOTA": "ND", OHIO: "OH", OKLAHOMA: "OK", OREGON: "OR", PENNSYLVANIA: "PA",
        "RHODE ISLAND": "RI", "SOUTH CAROLINA": "SC", "SOUTH DAKOTA": "SD", TENNESSEE: "TN",
        TEXAS: "TX", UTAH: "UT", VERMONT: "VT", VIRGINIA: "VA", WASHINGTON: "WA",
        "WEST VIRGINIA": "WV", WISCONSIN: "WI", WYOMING: "WY"
      };

      for (const [name, abbr] of Object.entries(stateNames)) {
        if (upper.includes(name)) return abbr;
      }
      return null;
    }

    function inferTimeZoneFromAddress(address) {
      const state = getAddressState(address);
      const map = {
        AL: "America/Chicago", AK: "America/Anchorage", AZ: "America/Phoenix", AR: "America/Chicago",
        CA: "America/Los_Angeles", CO: "America/Denver", CT: "America/New_York", DE: "America/New_York",
        FL: "America/New_York", GA: "America/New_York", HI: "Pacific/Honolulu", ID: "America/Denver",
        IL: "America/Chicago", IN: "America/New_York", IA: "America/Chicago", KS: "America/Chicago",
        KY: "America/New_York", LA: "America/Chicago", ME: "America/New_York", MD: "America/New_York",
        MA: "America/New_York", MI: "America/New_York", MN: "America/Chicago", MS: "America/Chicago",
        MO: "America/Chicago", MT: "America/Denver", NE: "America/Chicago", NV: "America/Los_Angeles",
        NH: "America/New_York", NJ: "America/New_York", NM: "America/Denver", NY: "America/New_York",
        NC: "America/New_York", ND: "America/Chicago", OH: "America/New_York", OK: "America/Chicago",
        OR: "America/Los_Angeles", PA: "America/New_York", RI: "America/New_York", SC: "America/New_York",
        SD: "America/Chicago", TN: "America/Chicago", TX: "America/Chicago", UT: "America/Denver",
        VT: "America/New_York", VA: "America/New_York", WA: "America/Los_Angeles", WV: "America/New_York",
        WI: "America/Chicago", WY: "America/Denver"
      };
      return map[state] || Intl.DateTimeFormat().resolvedOptions().timeZone;
    }

    function getGreetingFromTimeZone(address) {
      const timeZone = inferTimeZoneFromAddress(address);
      const localHourString = new Intl.DateTimeFormat("en-US", {
        hour: "numeric",
        hour12: false,
        timeZone
      }).format(new Date());

      const hour = parseInt(localHourString, 10);
      if (hour < 12) return "morning";
      if (hour < 17) return "afternoon";
      return "evening";
    }

    function parseTime12(timeString) {
      const match = String(timeString || "").trim().match(/^(\d{1,2}):(\d{2})\s*(AM|PM)$/i);
      if (!match) return null;

      let hours = parseInt(match[1], 10);
      const minutes = parseInt(match[2], 10);
      const meridiem = match[3].toUpperCase();

      if (meridiem === "AM" && hours === 12) hours = 0;
      if (meridiem === "PM" && hours !== 12) hours += 12;

      return { hours, minutes };
    }

    function getZonedParts(date, timeZone) {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date);

      const obj = {};
      for (const part of parts) {
        if (part.type !== "literal") obj[part.type] = part.value;
      }

      return {
        year: parseInt(obj.year, 10),
        month: parseInt(obj.month, 10),
        day: parseInt(obj.day, 10),
        hour: parseInt(obj.hour, 10),
        minute: parseInt(obj.minute, 10)
      };
    }

    function zonedDateTimeToDate(dateStr, timeStr, timeZone) {
      const [year, month, day] = dateStr.split("-").map(Number);
      const parsedTime = parseTime12(timeStr);
      if (!year || !month || !day || !parsedTime) return null;

      let utcGuess = Date.UTC(year, month - 1, day, parsedTime.hours, parsedTime.minutes);

      for (let i = 0; i < 3; i++) {
        const zoned = getZonedParts(new Date(utcGuess), timeZone);
        const desiredUtc = Date.UTC(year, month - 1, day, parsedTime.hours, parsedTime.minutes);
        const zonedUtc = Date.UTC(zoned.year, zoned.month - 1, zoned.day, zoned.hour, zoned.minute);
        utcGuess += desiredUtc - zonedUtc;
      }

      return new Date(utcGuess);
    }

    function formatLocalTime(dateObj) {
      return dateObj.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    }

    function formatLocalDateInput(dateObj) {
      const y = dateObj.getFullYear();
      const m = String(dateObj.getMonth() + 1).padStart(2, "0");
      const d = String(dateObj.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function buildConvertedSchedule(site) {
      const siteTimeZone = inferTimeZoneFromAddress(site.address);

      if (site.arrival_type === "window") {
        const startDate = zonedDateTimeToDate(site.date, site.window_start, siteTimeZone);
        const endDate = zonedDateTimeToDate(site.date, site.window_end, siteTimeZone);

        if (!startDate || !endDate) {
          return {
            calendarDate: site.date,
            localTime: "",
            localWindowStart: site.window_start,
            localWindowEnd: site.window_end,
            displayTime: `${site.window_start} - ${site.window_end}`
          };
        }

        return {
          calendarDate: formatLocalDateInput(startDate),
          localTime: "",
          localWindowStart: formatLocalTime(startDate),
          localWindowEnd: formatLocalTime(endDate),
          displayTime: `${formatLocalTime(startDate)} - ${formatLocalTime(endDate)}`
        };
      }

      const converted = zonedDateTimeToDate(site.date, site.time, siteTimeZone);

      if (!converted) {
        return {
          calendarDate: site.date,
          localTime: site.time,
          localWindowStart: "",
          localWindowEnd: "",
          displayTime: site.time
        };
      }

      return {
        calendarDate: formatLocalDateInput(converted),
        localTime: formatLocalTime(converted),
        localWindowStart: "",
        localWindowEnd: "",
        displayTime: formatLocalTime(converted)
      };
    }

    function getScopeLabel(projectType) {
      if (projectType === "access_control") return "Service Access Control System";
      if (projectType === "both") return "Service IP Camera and Access Control System";
      return "Service IP Camera System";
    }

    function getSubjectPrefix(projectType, isMulti) {
      if (projectType === "access_control") {
        return isMulti
          ? "SCW Access Control Services Confirmed"
          : "SCW Access Control Service Confirmed";
      }
      if (projectType === "both") {
        return isMulti
          ? "SCW IP Camera / Access Control Services Confirmed"
          : "SCW IP Camera / Access Control Service Confirmed";
      }
      return isMulti
        ? "SCW IP Camera Services Confirmed"
        : "SCW IP Camera Service Confirmed";
    }

    function buildArrivalText(site) {
      if (site.arrival_type === "window") {
        return `${formatPrettyDate(site.date)} with an Arrival Window of ${site.window_start} - ${site.window_end} (Local Time)`;
      }
      return `${formatPrettyDate(site.date)} at ${site.time} (Local Time)`;
    }

    function buildProposalBlock(site, projectType) {
      if (projectType === "both") {
        return `IP Camera Proposal #: ${site.ip_camera_proposal}
Access Control Proposal #: ${site.access_control_proposal}`;
      }
      return `Proposal #: ${site.proposal}`;
    }

    function getSiteData(siteNumber, projectType) {
      const isBoth = projectType === "both";

      return {
        date: document.getElementById(`date_${siteNumber}`).value.trim(),
        arrival_type: document.getElementById(`arrival_type_${siteNumber}`).value,
        time: document.getElementById(`time_${siteNumber}`).value.trim(),
        window_start: document.getElementById(`window_start_${siteNumber}`).value.trim(),
        window_end: document.getElementById(`window_end_${siteNumber}`).value.trim(),
        contact_name: document.getElementById(`contact_name_${siteNumber}`).value.trim(),
        contact_phone: document.getElementById(`contact_phone_${siteNumber}`).value.trim(),
        contact_email: document.getElementById(`contact_email_${siteNumber}`).value.trim(),
        client: document.getElementById(`client_${siteNumber}`).value.trim(),
        site: document.getElementById(`site_${siteNumber}`).value.trim(),
        address: document.getElementById(`address_${siteNumber}`).value.trim(),
        task_id: isBoth ? "" : document.getElementById(`clickup_task_id_${siteNumber}`).value.trim(),
        proposal: isBoth ? "" : document.getElementById(`proposal_${siteNumber}`).value.trim(),
        ip_camera_clickup_id: isBoth ? document.getElementById(`ip_camera_clickup_id_${siteNumber}`).value.trim() : "",
        access_control_clickup_id: isBoth ? document.getElementById(`access_control_clickup_id_${siteNumber}`).value.trim() : "",
        ip_camera_proposal: isBoth ? document.getElementById(`ip_camera_proposal_${siteNumber}`).value.trim() : "",
        access_control_proposal: isBoth ? document.getElementById(`access_control_proposal_${siteNumber}`).value.trim() : ""
      };
    }

    function validateSite(site, projectType, label) {
      if (!site.date || !site.contact_name || !site.client || !site.site || !site.address) {
        throw new Error(`${label}: please fill out all required fields.`);
      }

      if (site.arrival_type === "exact" && !site.time) {
        throw new Error(`${label}: please enter the exact time.`);
      }

      if (site.arrival_type === "window" && (!site.window_start || !site.window_end)) {
        throw new Error(`${label}: please enter both window times.`);
      }

      if (projectType === "both") {
        if (!site.ip_camera_clickup_id || !site.access_control_clickup_id) {
          throw new Error(`${label}: please enter both ClickUp IDs.`);
        }
        if (!site.ip_camera_proposal || !site.access_control_proposal) {
          throw new Error(`${label}: please enter both proposal numbers.`);
        }
      } else {
        if (!site.task_id) {
          throw new Error(`${label}: please enter the ClickUp ID.`);
        }
        if (!site.proposal) {
          throw new Error(`${label}: please enter the proposal number.`);
        }
      }
    }

    function buildSingleSiteEmail(projectType, techName, techPhone, site) {
      const greeting = getGreetingFromTimeZone(site.address);

      return `Good ${greeting} everyone,

The technician is confirmed for ${buildArrivalText(site)} for arrival on site.

Technician information
${techName}
Phone: ${techPhone}

Project Scope
${getScopeLabel(projectType)}

Site Contact Information
Name: ${site.contact_name}
Email: ${site.contact_email}
Phone: ${site.contact_phone}

Client: ${site.client}
Site: ${site.site}
Project Address: ${site.address}

${buildProposalBlock(site, projectType)}

If any of the information above needs correction, please email me as soon as possible.

Thank you,`;
    }

    function buildMultiSiteEmail(projectType, techName, techPhone, site1, site2) {
      const greeting = getGreetingFromTimeZone(site1.address);

      return `Good ${greeting} everyone,

The technician is confirmed for the following service appointments.

Technician information
${techName}
Phone: ${techPhone}

Site 1
Technician arrival: ${buildArrivalText(site1)}

Project Scope
${getScopeLabel(projectType)}

Site Contact Information
Name: ${site1.contact_name}
Email: ${site1.contact_email}
Phone: ${site1.contact_phone}

Client: ${site1.client}
Site: ${site1.site}
Project Address: ${site1.address}

${buildProposalBlock(site1, projectType)}

Site 2
Technician arrival: ${buildArrivalText(site2)}

Project Scope
${getScopeLabel(projectType)}

Site Contact Information
Name: ${site2.contact_name}
Email: ${site2.contact_email}
Phone: ${site2.contact_phone}

Client: ${site2.client}
Site: ${site2.site}
Project Address: ${site2.address}

${buildProposalBlock(site2, projectType)}

If any of the information above needs correction, please email me as soon as possible.

Thank you,`;
    }

    async function saveEventForSite(site, projectType, techName, techPhone) {
      const converted = buildConvertedSchedule(site);

      const eventPayload = {
        client: site.client,
        site: site.site,
        address: site.address,
        technician: techName,
        technician_phone: techPhone,
        contact_name: site.contact_name,
        contact_email: site.contact_email,
        contact_phone: site.contact_phone,
        proposal: site.proposal,
        task_id: site.task_id,
        template_type: "Service",
        project_type: projectType,
        date: converted.calendarDate,
        site_date: site.date,
        time: converted.localTime,
        window_start: converted.localWindowStart,
        window_end: converted.localWindowEnd,
        displayTime: converted.displayTime,
        site_display_time: site.arrival_type === "window"
          ? `${site.window_start} - ${site.window_end}`
          : site.time,
        site_timezone: inferTimeZoneFromAddress(site.address),
        site_timezone_label: "",
        arrival_type: site.arrival_type,
        checked_in: false,
        checked_out: false,
        check_in_time: "",
        check_out_time: "",
        ip_camera_clickup_id: site.ip_camera_clickup_id,
        access_control_clickup_id: site.access_control_clickup_id,
        ip_camera_proposal: site.ip_camera_proposal,
        access_control_proposal: site.access_control_proposal
      };

      const res = await fetch(`${API_URL}/events`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(eventPayload)
      });

      if (!res.ok) {
        throw new Error("One of the site events did not save to the calendar.");
      }
    }

    async function generateService() {
      try {
        await autoSaveTech();

        const projectType = document.getElementById("project_type").value;
        const isMulti = document.getElementById("site_count").value === "2";
        const techName = document.getElementById("tech_name").value.trim();
        const techPhone = document.getElementById("tech_phone").value.trim();

        if (!techName || !techPhone) {
          alert("Please enter the technician name and phone.");
          return;
        }

        const site1 = getSiteData(1, projectType);
        validateSite(site1, projectType, "Site 1");

        let subject = "";
        let body = "";

        if (isMulti) {
          const site2 = getSiteData(2, projectType);
          validateSite(site2, projectType, "Site 2");

          subject = `${getSubjectPrefix(projectType, true)} for ${site1.client}`;
          body = buildMultiSiteEmail(projectType, techName, techPhone, site1, site2);

          await saveEventForSite(site1, projectType, techName, techPhone);
          await saveEventForSite(site2, projectType, techName, techPhone);
        } else {
          subject = `${getSubjectPrefix(projectType, false)} for ${buildArrivalText(site1)}`;
          body = buildSingleSiteEmail(projectType, techName, techPhone, site1);

          await saveEventForSite(site1, projectType, techName, techPhone);
        }

        document.getElementById("subject_output").value = subject;
        document.getElementById("body_output").value = body;

        alert("Service template generated and saved.");
      } catch (error) {
        console.error(error);
        alert(`Service template failed: ${error.message}`);
      }
    }

    function copySubject() {
      const field = document.getElementById("subject_output");
      field.select();
      document.execCommand("copy");
      alert("Subject copied.");
    }

    function copyBody() {
      const field = document.getElementById("body_output");
      field.select();
      document.execCommand("copy");
      alert("Email body copied.");
    }

    function openOutlook() {
      const subject = encodeURIComponent(document.getElementById("subject_output").value);
      const body = encodeURIComponent(document.getElementById("body_output").value);
      window.open(`https://outlook.office.com/mail/deeplink/compose?subject=${subject}&body=${body}`, "_blank");
    }

    async function initPage() {
      await fetchTechnicians();
      toggleArrivalType(1);
      toggleArrivalType(2);
      toggleSiteCount();
      toggleAllProjectTypeFields();
    }

    initPage();
  </script>
